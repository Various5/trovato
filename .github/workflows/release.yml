name: Build Windows Installer

# Triggered on:
#   - pushing a tag like v0.1.0 → builds, smoke-tests, attaches to Release
#   - manually via the Actions tab (workflow_dispatch) → artefact-only

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Freeze app with PyInstaller
        shell: pwsh
        run: |
          python installer/build.py
          if (-not (Test-Path "dist/Trovato/Trovato.exe")) {
            Write-Error "PyInstaller did not produce Trovato.exe"
            exit 1
          }

      # -----------------------------------------------------------------
      # Smoke-test: actually boot the frozen exe and verify the server
      # responds on /api/health/ping. If this fails we abort the release
      # so a broken installer can never reach a user.
      # -----------------------------------------------------------------
      - name: Smoke-test the frozen exe
        shell: pwsh
        run: |
          $env:LDI_PORT       = "18765"
          $env:LDI_DATA_DIR   = "$env:RUNNER_TEMP\ldi-smoke"
          $env:LDI_LOG_LEVEL  = "WARNING"
          $env:LDI_NO_WINDOW  = "1"  # don't try to open a desktop window on the CI VM
          $base = "http://127.0.0.1:18765"
          $exe  = (Resolve-Path "dist/Trovato/Trovato.exe").Path
          Write-Host "Launching $exe …"
          $proc = Start-Process -PassThru -FilePath $exe

          function Dump-Logs {
              $globs = @(
                  "$env:APPDATA\Trovato\crash-*.log",
                  "$env:RUNNER_TEMP\ldi-smoke\crash-*.log",
                  "$env:RUNNER_TEMP\ldi-smoke\logs\*.log",
                  "$env:USERPROFILE\.trovato\crash-*.log",
                  "$env:RUNNER_TEMP\Trovato\crash-*.log"
              )
              Get-ChildItem -Path $globs -ErrorAction SilentlyContinue |
                  Sort-Object LastWriteTime -Descending |
                  Select-Object -First 5 |
                  ForEach-Object {
                      Write-Host "=== Log: $($_.FullName) ==="
                      Get-Content -Path $_.FullName -Raw | Write-Host
                  }
          }

          # 1) Wait for the ping endpoint.
          $deadline = [DateTime]::UtcNow.AddSeconds(120)
          $up = $false
          $lastError = ""
          while ([DateTime]::UtcNow -lt $deadline) {
              if ($proc.HasExited) {
                  Write-Host "Process exited prematurely with code $($proc.ExitCode)"
                  break
              }
              try {
                  $r = Invoke-WebRequest -Uri "$base/api/health/ping" -UseBasicParsing -TimeoutSec 3
                  if ($r.StatusCode -eq 200) {
                      Write-Host "Ping OK: $($r.Content)"
                      $up = $true; break
                  }
              } catch { $lastError = $_.Exception.Message }
              Start-Sleep -Milliseconds 800
          }
          if (-not $up) {
              Dump-Logs
              if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue }
              Write-Error "Smoke test failed — server didn't answer ping within 120s. Last error: $lastError"
              exit 1
          }

          # 2) First-run + login. This is the path that crashed v0.1.3 with
          #    DetachedInstanceError on /api/auth/me.
          $session = New-Object Microsoft.PowerShell.Commands.WebRequestSession
          try {
              $body = @{ username = "ci"; password = "smoketest1234" } | ConvertTo-Json
              Invoke-RestMethod -Uri "$base/api/auth/first-run" -Method POST -Body $body `
                                -ContentType "application/json" -WebSession $session | Out-Null
              Write-Host "✓ /api/auth/first-run OK"
              Invoke-RestMethod -Uri "$base/api/auth/login" -Method POST -Body $body `
                                -ContentType "application/json" -WebSession $session | Out-Null
              $me = Invoke-RestMethod -Uri "$base/api/auth/me" -WebSession $session
              if ($me.username -ne "ci") { throw "unexpected /me payload" }
              Write-Host "✓ /api/auth/me OK ($($me.username))"
          } catch {
              Dump-Logs
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
              Write-Error "auth flow failed: $($_.Exception.Message)"
              exit 1
          }

          # 3) Every authenticated UI page must render. Used to crash with
          #    DetachedInstanceError before expire_on_commit=False.
          $pages = @("/", "/documents", "/search", "/chat", "/sources", "/tags",
                     "/backup", "/settings", "/diagnostics", "/logs", "/about", "/compare")
          $failed = @()
          foreach ($p in $pages) {
              try {
                  $r = Invoke-WebRequest -Uri "$base$p" -UseBasicParsing -WebSession $session -TimeoutSec 10
                  if ($r.StatusCode -ne 200) { $failed += "$p ($($r.StatusCode))" }
              } catch { $failed += "$p ($($_.Exception.Message))" }
          }
          if ($failed.Count -gt 0) {
              Dump-Logs
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
              Write-Error "UI pages failed: $($failed -join ', ')"
              exit 1
          }
          Write-Host "✓ All $($pages.Count) UI pages returned 200"

          if (-not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
              try { $proc.WaitForExit(8000) | Out-Null } catch {}
          }
          Write-Host "✓ Smoke test passed"

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version -or $version -eq "main" -or $version -eq "master") {
            $version = "dev-$($env:GITHUB_SHA.Substring(0,7))"
          }
          $zip = "Trovato-$version-portable-win64.zip"
          Compress-Archive -Path "dist/Trovato/*" -DestinationPath "dist/$zip"
          echo "ARTIFACT_ZIP=dist/$zip" >> $env:GITHUB_ENV
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\trovato.iss
          $exe = Get-ChildItem installer\Output\*.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "Inno Setup produced no .exe"
            exit 1
          }
          echo "INSTALLER_EXE=$($exe.FullName)" >> $env:GITHUB_ENV

      # Best-effort: handy for workflow_dispatch (non-tag) builds. For a tag
      # build the same files are attached to the Release below, so a failure
      # here (e.g. Actions artifact-storage quota) must NOT block the release.
      - name: Upload build artifacts (always)
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: Trovato-${{ env.VERSION }}
          path: |
            ${{ env.ARTIFACT_ZIP }}
            ${{ env.INSTALLER_EXE }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ env.ARTIFACT_ZIP }}
            ${{ env.INSTALLER_EXE }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Mark pre-release tags (PEP440 aN / bN / rcN, e.g. v0.4.0b4) as
          # prereleases so they don't show as the stable "Latest" release.
          # Final tags are numeric-only (vX.Y.Z) and stay full releases.
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
