name: Build Windows Installer

# Triggered on:
#   - pushing a tag like v0.1.0 → builds, smoke-tests, attaches to Release
#   - manually via the Actions tab (workflow_dispatch) → artefact-only

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Freeze app with PyInstaller
        shell: pwsh
        run: |
          python installer/build.py
          if (-not (Test-Path "dist/LocalDocIntelligence/LocalDocIntelligence.exe")) {
            Write-Error "PyInstaller did not produce LocalDocIntelligence.exe"
            exit 1
          }

      # -----------------------------------------------------------------
      # Smoke-test: actually boot the frozen exe and verify the server
      # responds on /api/health/ping. If this fails we abort the release
      # so a broken installer can never reach a user.
      # -----------------------------------------------------------------
      - name: Smoke-test the frozen exe
        shell: pwsh
        run: |
          $env:LDI_PORT       = "18765"
          $env:LDI_DATA_DIR   = "$env:RUNNER_TEMP\ldi-smoke"
          $env:LDI_LOG_LEVEL  = "WARNING"
          $exe = (Resolve-Path "dist/LocalDocIntelligence/LocalDocIntelligence.exe").Path
          Write-Host "Launching $exe …"
          $proc = Start-Process -PassThru -FilePath $exe
          $deadline = [DateTime]::UtcNow.AddSeconds(120)
          $up = $false
          $lastError = ""
          while ([DateTime]::UtcNow -lt $deadline) {
              if ($proc.HasExited) {
                  Write-Host "Process exited prematurely with code $($proc.ExitCode)"
                  break
              }
              try {
                  $r = Invoke-WebRequest -Uri "http://127.0.0.1:18765/api/health/ping" `
                                          -UseBasicParsing -TimeoutSec 3
                  if ($r.StatusCode -eq 200) {
                      Write-Host "Ping OK: $($r.Content)"
                      $up = $true
                      break
                  }
              } catch {
                  $lastError = $_.Exception.Message
              }
              Start-Sleep -Milliseconds 800
          }

          # Clean shutdown so the crash-dump (if any) is flushed.
          if (-not $proc.HasExited) {
              Write-Host "Terminating server …"
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
              try { $proc.WaitForExit(8000) | Out-Null } catch {}
          }

          # Dump any crash-log we can find so the job log shows what happened.
          $crashGlobs = @(
              "$env:APPDATA\LocalDocIntelligence\crash-*.log",
              "$env:RUNNER_TEMP\ldi-smoke\crash-*.log",
              "$env:USERPROFILE\.localdoc-intelligence\crash-*.log",
              "$env:RUNNER_TEMP\LocalDocIntelligence\crash-*.log"
          )
          Get-ChildItem -Path $crashGlobs -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 3 |
              ForEach-Object {
                  Write-Host "=== Crash dump: $($_.FullName) ==="
                  Get-Content -Path $_.FullName -Raw | Write-Host
              }

          if (-not $up) {
              Write-Error "Smoke test failed — server didn't answer /api/health/ping within 120s. Last error: $lastError"
              exit 1
          }
          Write-Host "✓ Smoke test passed"

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version -or $version -eq "main" -or $version -eq "master") {
            $version = "dev-$($env:GITHUB_SHA.Substring(0,7))"
          }
          $zip = "LocalDocIntelligence-$version-portable-win64.zip"
          Compress-Archive -Path "dist/LocalDocIntelligence/*" -DestinationPath "dist/$zip"
          echo "ARTIFACT_ZIP=dist/$zip" >> $env:GITHUB_ENV
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\localdoc.iss
          $exe = Get-ChildItem installer\Output\*.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "Inno Setup produced no .exe"
            exit 1
          }
          echo "INSTALLER_EXE=$($exe.FullName)" >> $env:GITHUB_ENV

      - name: Upload build artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: LocalDocIntelligence-${{ env.VERSION }}
          path: |
            ${{ env.ARTIFACT_ZIP }}
            ${{ env.INSTALLER_EXE }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARTIFACT_ZIP }}
            ${{ env.INSTALLER_EXE }}
          generate_release_notes: true
          fail_on_unmatched_files: true
