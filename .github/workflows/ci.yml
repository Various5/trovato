name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Least privilege: CI only reads the repo. A malicious PR therefore can't use
# the workflow token to write code, releases, packages, or issues. (No secrets
# are referenced here, and pull_request runs in the fork's read-only context.)
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install ruff
        run: python -m pip install --upgrade pip ruff black
      - name: ruff
        run: ruff check app tests scripts
      - name: black --check
        run: black --check app tests scripts

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
        database: ["sqlite", "postgres"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ldi
          POSTGRES_PASSWORD: ldi
          POSTGRES_DB: ldi
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ldi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: System deps (tesseract for OCR tests)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-deu
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          if [ "${{ matrix.database }}" = "postgres" ]; then
            pip install -e ".[postgres]"
            echo "LDI_DB_URL=postgresql+psycopg://ldi:ldi@localhost:5432/ldi" >> $GITHUB_ENV
          fi
      - name: Run tests
        run: pytest --maxfail=5 --tb=short

  e2e:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    # E2E is a smoke check, not a gate — flaky boot timings on shared CI
    # runners shouldn't block merges. Look at the artefact if it fails.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,e2e]"
          playwright install --with-deps chromium
      - name: E2E smoke
        run: pytest tests/e2e -m e2e -s
      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs
          path: |
            /tmp/pytest-of-runner/**/ldi-e2e*/logs/
          if-no-files-found: ignore
